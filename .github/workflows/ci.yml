name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: latest
            image: opencfd/openfoam-dev:latest
            build_args: -j
          - name: v2412
            image: opencfd/openfoam-dev:2412
            build_args: ""
          - name: v2506
            image: opencfd/openfoam-dev:2506
            build_args: ""

    name: OpenFOAM ${{ matrix.name }}
    container:
      image: ${{ matrix.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Install CI dependencies
        run: |
          apt-get update
          apt-get install -y python3 python-is-python3 libboost-dev

      - name: Build
        shell: bash
        run: |
          openfoam -c 'cd "$GITHUB_WORKSPACE"; export BOOST_ARCH_PATH=/usr/include; ./Allwclean; ./Allwmake ${{ matrix.build_args }}'
